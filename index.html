    <!-- Structured Data -->
    <style>
        :root {
            --bg-deep: #0a0c10;
            --bg-mid: #0d1117;
            --node-core: #4a90c2;
            --node-glow: rgba(74, 144, 194, 0.8);
            --node-bright: #6bb3e0;
            --text-primary: #e8eef4;
            --text-secondary: #8294a8;
            --text-dim: #4a5a6a;
            --accent: #5a9fcf;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            font-family: 'Outfit', sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* ========== BACKGROUND SYSTEM ========== */
        .bg-system {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .bg-gradient {
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(ellipse 80% 60% at 50% 40%, rgba(20, 40, 60, 0.4) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 25% 70%, rgba(15, 35, 55, 0.3) 0%, transparent 50%),
                radial-gradient(ellipse 50% 40% at 80% 25%, rgba(25, 45, 65, 0.25) 0%, transparent 50%),
                linear-gradient(180deg, var(--bg-deep) 0%, var(--bg-mid) 50%, var(--bg-deep) 100%);
        }

        .topo-svg {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 140%;
            height: 140%;
            transform: translate(-50%, -50%);
        }

        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(74, 144, 194, 0.4) 20%,
                rgba(74, 144, 194, 0.6) 50%,
                rgba(74, 144, 194, 0.4) 80%,
                transparent 100%
            );
            box-shadow: 0 0 20px 2px rgba(74, 144, 194, 0.3);
            animation: scan 10s ease-in-out infinite;
        }

        @keyframes scan {
            0%, 100% { top: 5%; opacity: 0; }
            5% { opacity: 1; }
            95% { opacity: 1; }
            98% { top: 95%; opacity: 0; }
        }

        .nodes-container { position: absolute; inset: 0; }

        .node {
            position: absolute;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        .node--lg {
            width: 6px;
            height: 6px;
            background: var(--node-bright);
            box-shadow: 
                0 0 8px 2px var(--node-glow),
                0 0 25px 6px rgba(74, 144, 194, 0.35),
                0 0 50px 12px rgba(74, 144, 194, 0.12);
        }

        .node--md {
            width: 4px;
            height: 4px;
            background: var(--node-core);
            box-shadow: 
                0 0 6px 2px rgba(74, 144, 194, 0.5),
                0 0 15px 4px rgba(74, 144, 194, 0.2);
        }

        .node--sm {
            width: 2px;
            height: 2px;
            background: rgba(74, 144, 194, 0.6);
            box-shadow: 0 0 4px 1px rgba(74, 144, 194, 0.25);
        }

        .node--pulse { animation: nodePulse 5s ease-in-out infinite; }
        .node--pulse-delay { animation: nodePulse 5s ease-in-out infinite; animation-delay: 2.5s; }

        @keyframes nodePulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
            50% { transform: translate(-50%, -50%) scale(1.4); opacity: 1; }
        }

        .connections-svg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        .vignette {
            position: absolute;
            inset: 0;
            background: radial-gradient(
                ellipse 65% 55% at 50% 50%,
                transparent 0%,
                transparent 35%,
                rgba(10, 12, 16, 0.75) 70%,
                rgba(10, 12, 16, 0.98) 100%
            );
            pointer-events: none;
        }

        .noise {
            position: absolute;
            inset: 0;
            opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        /* ========== PAGE LAYOUT ========== */
        .page {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            justify-content: center;
            padding: 60px 40px;
        }

        .content {
            text-align: center;
            max-width: 900px;
            width: 100%;
        }

        /* ========== REFINED VISUAL HIERARCHY ========== */
        
        /* 1. LOGO: Brand anchor — present but not overwhelming */
        .logo {
            display: block;
            width: 320px;
            max-width: 70vw;
            height: auto;
            margin: 0 auto 20px auto;
            opacity: 0.95;
        }

        /* 2. TAGLINE: Secondary — readable but clearly subordinate */
        .tagline {
            font-family: 'Space Mono', monospace;
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 48px;
            opacity: 0.85;
        }

        /* 3. HOOK: THE HERO — this is what they remember */
        .hook {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(48px, 6vw, 80px);
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 40px;
            letter-spacing: -0.02em;
            line-height: 1.05;
        }

        /* 4. TEAM LINE: Credibility whisper */
        .team-line {
            font-size: 18px;
            font-weight: 400;
            color: var(--text-secondary);
            margin-bottom: 56px;
            line-height: 1.6;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            opacity: 0.8;
        }

        /* 5. CTA: Clear but not screaming */
        .contact-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 20px 56px;
            border: 1px solid rgba(74, 144, 194, 0.35);
            background: rgba(74, 144, 194, 0.05);
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .contact-btn:hover {
            background: rgba(74, 144, 194, 0.12);
            border-color: rgba(74, 144, 194, 0.6);
            box-shadow: 0 0 30px rgba(74, 144, 194, 0.12);
            transform: translateY(-2px);
        }

        .contact-btn::after {
            content: '→';
            opacity: 0.7;
            transition: all 0.3s ease;
        }

        .contact-btn:hover::after {
            transform: translateX(4px);
            opacity: 1;
        }

        .contact-btn:focus {
            outline: none;
        }

        .contact-btn:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 4px;
        }

        /* Footer */
        .footer {
            position: fixed;
            bottom: 24px;
            left: 0;
            right: 0;
            text-align: center;
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            letter-spacing: 0.08em;
            color: var(--text-dim);
            opacity: 0.6;
            z-index: 1;
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 768px) {
            .page {
                padding: 48px 24px;
            }
            .content {
                max-width: 100%;
            }
            .logo { width: 220px; margin-bottom: 16px; }
            .tagline { font-size: 12px; letter-spacing: 0.2em; margin-bottom: 36px; }
            .hook { margin-bottom: 28px; }
            .team-line { font-size: 16px; margin-bottom: 44px; padding: 0 8px; }
            .contact-btn { padding: 16px 40px; font-size: 13px; }
            .footer { font-size: 11px; bottom: 16px; }
            .scan-line { display: none; }
        }

        @media (max-width: 480px) {
            .logo { width: 180px; }
            .tagline { font-size: 11px; margin-bottom: 28px; }
            .team-line { font-size: 15px; }
            .contact-btn { padding: 14px 32px; font-size: 12px; }
        }

        /* ========== MODAL ========== */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: rgba(10, 12, 16, 0.96);
            backdrop-filter: blur(8px);
        }

        .modal.active { display: flex; }

        .modal__box {
            background: linear-gradient(145deg, rgba(18, 24, 32, 0.98) 0%, rgba(12, 16, 22, 0.99) 100%);
            border: 1px solid rgba(74, 144, 194, 0.15);
            padding: 48px;
            max-width: 420px;
            width: 100%;
            position: relative;
            box-shadow: 0 0 80px rgba(0, 0, 0, 0.6), 0 0 40px rgba(74, 144, 194, 0.08);
        }

        .modal__close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 20px;
            cursor: pointer;
            padding: 4px;
            transition: color 0.2s ease;
        }

        .modal__close:hover { color: var(--text-primary); }
        .modal__close:focus { outline: none; }
        .modal__close:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

        .modal__title {
            font-family: 'Outfit', sans-serif;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 32px;
            color: var(--text-primary);
        }

        .form-group { margin-bottom: 24px; }

        .form-group label {
            display: block;
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 14px 16px;
            background: rgba(10, 12, 16, 0.7);
            border: 1px solid rgba(74, 144, 194, 0.15);
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: rgba(74, 144, 194, 0.4);
            box-shadow: 0 0 20px rgba(74, 144, 194, 0.08);
        }

        .form-group textarea { min-height: 100px; resize: vertical; }

        .form-submit {
            width: 100%;
            padding: 16px 24px;
            background: var(--accent);
            border: none;
            color: var(--bg-deep);
            font-family: 'Outfit', sans-serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .form-submit:hover {
            background: var(--node-bright);
            box-shadow: 0 0 25px rgba(74, 144, 194, 0.25);
        }

        .form-success { display: none; text-align: center; padding: 40px 20px; }
        .form-success.active { display: block; }
        .form-success p { font-size: 15px; color: var(--text-secondary); margin-top: 12px; }
        .contact-form.hidden { display: none; }
    </style>
</head>

            <p class="tagline">Asymmetric Advantage in Extremis</p>
            
            <h1 class="hook">Adapt faster.<br>Operate anywhere.</h1>
            
            <p class="team-line">Founded by Naval Special Operations veterans<br>and Skunk Works engineers.</p>
            
            <button class="contact-btn" onclick="openModal()" aria-label="Open contact form">Contact</button>
        </div>
    </div>
    
    <footer class="footer">© 2026 Asymmetris&nbsp;&nbsp;·&nbsp;&nbsp;Round Rock, TX</footer>

    <div class="modal" id="modal" onclick="closeModalOutside(event)">
        <div class="modal__box" onclick="event.stopPropagation()">
            <button class="modal__close" onclick="closeModal()" aria-label="Close contact form">×</button>
            
            <form class="contact-form" id="contactForm" name="contact" method="POST" data-netlify="true" onsubmit="submitForm(event)">
                <input type="hidden" name="form-name" value="contact">
                <h2 class="modal__title">Get in Touch</h2>
                
                <div class="form-group">
                    <label for="name">Name *</label>
                    <input type="text" id="name" name="name" required autocomplete="name">
                </div>
                
                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" required autocomplete="email">
                </div>
                
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message"></textarea>
                </div>
                
                <button type="submit" class="form-submit">Send</button>
            </form>
            
            <div class="form-success" id="formSuccess">
                <h2 class="modal__title">Thank you.</h2>
                <p>We'll be in touch.</p>
            </div>
        </div>
    </div>

    <script>
        function openModal() {
            document.getElementById('modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            document.body.style.overflow = '';
            setTimeout(() => {
                document.getElementById('contactForm').classList.remove('hidden');
                document.getElementById('formSuccess').classList.remove('active');
                document.getElementById('contactForm').reset();
            }, 300);
        }
        function closeModalOutside(event) { if (event.target.id === 'modal') closeModal(); }
        function submitForm(event) {
            event.preventDefault();
            const form = event.target;
            const formData = new FormData(form);
            fetch('/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams(formData).toString()
            }).then(() => {
                document.getElementById('contactForm').classList.add('hidden');
                document.getElementById('formSuccess').classList.add('active');
            }).catch(() => {
                document.getElementById('contactForm').classList.add('hidden');
                document.getElementById('formSuccess').classList.add('active');
            });
        }
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
    </script>
